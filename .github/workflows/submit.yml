name: LeetCode Daily Submit

on:
  schedule:
    # Runs every day at 12:30 AM IST (7:00 PM UTC)
    - cron: '0 19 * * *'
  workflow_dispatch:   # Also allows manual trigger from GitHub UI

jobs:
  submit:
    name: Submit Random Java Problem
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run submission
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF: ${{ secrets.LEETCODE_CSRF }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          QUESTION_SEARCH_LIMIT: ${{ vars.QUESTION_SEARCH_LIMIT }}
          MAX_RANDOM_TRIES: ${{ vars.MAX_RANDOM_TRIES }}
          INCLUDE_PAID_QUESTIONS: ${{ vars.INCLUDE_PAID_QUESTIONS }}
        run: node src/submit.js